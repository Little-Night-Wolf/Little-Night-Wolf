<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal | Little-Night-Wolf</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; width: 100%; }
        
        /* Loader */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }

        /* Header */
        header { text-align: center; margin-bottom: 60px; animation: fadeIn 0.8s ease; }
        #main-avatar { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid var(--primary); padding: 5px; margin-bottom: 20px;
            object-fit: cover;
        }

        /* Stats */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; margin-bottom: 60px; 
        }
        .stat-box { 
            background: var(--glass); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-val { display: block; font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-lab { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1.5px; }

        /* Repos */
        .repos-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; 
        }
        .repo-card {
            background: var(--card-bg); padding: 30px; border-radius: 24px;
            border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            backdrop-filter: blur(12px);
        }
        .repo-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .repo-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .repo-desc { font-size: 0.95rem; color: var(--text-dim); flex-grow: 1; margin-bottom: 20px; line-height: 1.6; }

        .repo-meta { display: flex; align-items: center; gap: 15px; font-size: 0.8rem; color: var(--text-dim); }
        .lang-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--primary); margin-bottom: 20px;"></i>
        <p id="loader-text">Cargando universo digital...</p>
    </div>

    <main class="container" id="main-content">
        <header>
            <img id="main-avatar" src="https://www.google.com/s2/favicons?sz=180&domain=github.com" alt="Avatar">
            <h1 id="main-name">Cargando...</h1>
            <p id="main-bio" style="color:var(--text-dim); margin-top:10px; max-width: 600px; margin-inline: auto;"></p>
        </header>

        <section class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="stat-repos">0</span>
                <span class="stat-lab">Repositorios</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="stat-followers">0</span>
                <span class="stat-lab">Seguidores</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="stat-stars">0</span>
                <span class="stat-lab">Estrellas</span>
            </div>
        </section>

        <h2 style="margin-bottom:35px; font-size: 1.8rem;">Proyectos Destacados</h2>
        <div id="repos-container" class="repos-grid">
            </div>
    </main>

    <script>
        const CONFIG = {
            username: 'Little-Night-Wolf',
            excluded: ['Little-Night-Wolf', 'Little-Night-Wolf.github.io'],
            cacheTime: 60 * 60 * 1000 // 1 hora de caché para evitar bloqueos de API
        };

        async function getGitHubData() {
            const cacheKey = `gh_data_${CONFIG.username}`;
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                const parsed = JSON.parse(cached);
                if (Date.now() - parsed.timestamp < CONFIG.cacheTime) {
                    return parsed.data;
                }
            }

            try {
                const [userRes, reposRes] = await Promise.all([
                    fetch(`https://api.github.com/users/${CONFIG.username}`),
                    fetch(`https://api.github.com/users/${CONFIG.username}/repos?sort=updated&per_page=100`)
                ]);

                if (!userRes.ok || !reposRes.ok) throw new Error("Error en la API");

                const userData = await userRes.json();
                const reposData = await reposRes.json();

                const finalData = { user: userData, repos: reposData };
                localStorage.setItem(cacheKey, JSON.stringify({
                    timestamp: Date.now(),
                    data: finalData
                }));

                return finalData;
            } catch (err) {
                console.error(err);
                return null;
            }
        }

        function renderUI(data) {
            if (!data) {
                document.getElementById('loader-text').innerText = "Error al conectar con GitHub. Reintenta más tarde.";
                document.querySelector('.fa-spin').style.display = 'none';
                return;
            }

            const { user, repos } = data;

            // Update Profile
            document.getElementById('main-avatar').src = user.avatar_url;
            document.getElementById('main-name').innerText = user.name || user.login;
            document.getElementById('main-bio').innerText = user.bio || "Desarrollador de software apasionado.";
            document.getElementById('stat-repos').innerText = user.public_repos;
            document.getElementById('stat-followers').innerText = user.followers;

            // Filter Repos
            const filteredRepos = repos.filter(repo => 
                !repo.fork && !CONFIG.excluded.includes(repo.name)
            ).slice(0, 12); // Limitamos a los 12 más recientes

            const totalStars = filteredRepos.reduce((acc, curr) => acc + curr.stargazers_count, 0);
            document.getElementById('stat-stars').innerText = totalStars;

            // Render Cards
            const container = document.getElementById('repos-container');
            container.innerHTML = ''; // Limpiar

            filteredRepos.forEach(repo => {
                const card = document.createElement('a');
                card.className = 'repo-card';
                card.href = repo.html_url;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="repo-title">${repo.name}</div>
                    <p class="repo-desc">${repo.description || "Sin descripción disponible."}</p>
                    <div class="repo-meta">
                        <span style="display:flex; align-items:center; gap:5px">
                            <div class="lang-dot"></div> ${repo.language || 'Code'}
                        </span>
                        <span><i class="far fa-star"></i> ${repo.stargazers_count}</span>
                        <span><i class="fas fa-code-branch"></i> ${repo.forks_count}</span>
                    </div>
                `;
                container.appendChild(card);
            });

            // Ocultar loader con efecto
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 500);
        }

        // Iniciar
        window.addEventListener('load', async () => {
            const data = await getGitHubData();
            renderUI(data);
        });
    </script>
</body>
</html>
