<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        /* --- Global Elements --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; width: 100%; }
        .hidden { display: none !important; }

        /* --- Full View Styles --- */
        header { text-align: center; margin-bottom: 60px; }
        #avatar { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 3px solid var(--primary); padding: 5px; margin-bottom: 20px;
        }
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; margin-bottom: 60px; 
        }
        .stat-box { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 15px; text-align: center;
        }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-lab { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        .repos-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; 
        }
        .repo-card {
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
        }
        .repo-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .repo-title { font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .repo-desc { font-size: 0.9rem; color: var(--text-dim); flex-grow: 1; margin-bottom: 15px; }

        /* --- Card View Mode (?view=card) --- */
        body.mode-card { justify-content: center; align-items: center; }
        .mode-card .full-content { display: none; }
        .mode-card .card-wrapper {
            display: block; width: 380px; background: var(--card-bg);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 40px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .mode-card #avatar { width: 110px; height: 110px; }
        .card-stats { display: flex; justify-content: space-around; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader */
        .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary)"></i></div>

    <main class="container full-content">
        <header>
            <img id="main-avatar" src="" alt="Avatar">
            <h1 id="main-name">...</h1>
            <p id="main-bio" style="color:var(--text-dim); margin-top:10px;"></p>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="stat-repos">0</span>
                <span class="stat-lab" data-i18n="repos">Repositories</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="stat-followers">0</span>
                <span class="stat-lab" data-i18n="followers">Followers</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="stat-stars">0</span>
                <span class="stat-lab" data-i18n="stars">Total Stars</span>
            </div>
        </div>

        <h2 style="margin-bottom:30px" data-i18n="projects">Featured Projects</h2>
        <div id="repos-container" class="repos-grid"></div>
    </main>

    <div class="card-wrapper hidden" id="biz-card">
        <img id="card-avatar" src="" alt="Avatar" id="avatar">
        <h1 id="card-real-name" style="font-size: 1.8rem;">...</h1>
        <p id="card-username" style="color:var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 15px;">@usr758</p>
        <div id="card-bio" style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px;"></div>
        
        <div class="card-stats">
            <div><span class="stat-val" id="c-stat-repos" style="font-size:1.2rem">0</span><span class="stat-lab" data-i18n="repos">Repos</span></div>
            <div><span class="stat-val" id="c-stat-followers" style="font-size:1.2rem">0</span><span class="stat-lab" data-i18n="followers">Followers</span></div>
        </div>
    </div>

    <script>
        /**
         * SETTINGS
         */
        const CONFIG = {
            username: 'Little-Night-Wolf',
            excluded: ['Little-Night-Wolf', 'Little-Night-Wolf.github.io'],
            i18n: {
                es: {
                    repos: "Repositorios",
                    followers: "Seguidores",
                    stars: "Estrellas",
                    projects: "Proyectos Destacados",
                    noDesc: "Sin descripción disponible."
                },
                en: {
                    repos: "Repositories",
                    followers: "Followers",
                    stars: "Total Stars",
                    projects: "Featured Projects",
                    noDesc: "No description available."
                },
                fr: {
                    repos: "Dépôts",
                    followers: "Abonnés",
                    stars: "Étoiles",
                    projects: "Projets Phares",
                    noDesc: "Aucune description disponible."
                }
            }
        };

        /**
         * TRANSLATION ENGINE
         */
        function translateUI() {
            const lang = navigator.language.split('-')[0];
            const dict = CONFIG.i18n[lang] || CONFIG.i18n.en;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dict[key]) el.innerText = dict[key];
            });
            return dict;
        }

        /**
         * CORE DATA FETCHING
         */
        async function fetchData() {
            const dict = translateUI();
            const urlParams = new URLSearchParams(window.location.search);
            const isCardView = urlParams.get('view') === 'card';

            try {
                // Fetch User Profile
                const uRes = await fetch(`https://api.github.com/users/${CONFIG.username}`);
                const u = await uRes.json();

                // Fetch Repositories
                const rRes = await fetch(`https://api.github.com/users/${CONFIG.username}/repos?sort=updated&per_page=100`);
                const r = await rRes.json();

                // Process Views
                if (isCardView) {
                    document.body.classList.add('mode-card');
                    document.getElementById('biz-card').classList.remove('hidden');
                    document.getElementById('card-avatar').src = u.avatar_url;
                    document.getElementById('card-real-name').innerText = u.name || u.login;
                    document.getElementById('card-bio').innerText = u.bio || "";
                    document.getElementById('c-stat-repos').innerText = u.public_repos;
                    document.getElementById('c-stat-followers').innerText = u.followers;
                } else {
                    // Populate Main View
                    document.getElementById('main-avatar').src = u.avatar_url;
                    document.getElementById('main-name').innerText = u.name || u.login;
                    document.getElementById('main-bio').innerText = u.bio || "";
                    document.getElementById('stat-repos').innerText = u.public_repos;
                    document.getElementById('stat-followers').innerText = u.followers;

                    // Filter & Render Repos
                    const filtered = r.filter(repo => !repo.fork && !CONFIG.excluded.includes(repo.name.toLowerCase()));
                    const totalStars = filtered.reduce((acc, curr) => acc + curr.stargazers_count, 0);
                    document.getElementById('stat-stars').innerText = totalStars;

                    const container = document.getElementById('repos-container');
                    filtered.forEach(repo => {
                        const card = document.createElement('a');
                        card.className = 'repo-card';
                        card.href = repo.html_url;
                        card.target = '_blank';
                        card.innerHTML = `
                            <div class="repo-title">${repo.name}</div>
                            <p class="repo-desc">${repo.description || dict.noDesc}</p>
                            <div style="font-size: 0.75rem; color: var(--text-dim)">
                                <i class="fas fa-circle" style="color:var(--primary); font-size:8px"></i> ${repo.language || 'Code'}
                                <span style="margin-left: 15px"><i class="far fa-star"></i> ${repo.stargazers_count}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }

                // Hide Loader
                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error("GitHub API Error:", err);
                document.getElementById('loader').innerHTML = "API Limit reached or Connection Error.";
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
